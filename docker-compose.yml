services:
  saniflow:
    build: .
    ports:
      - "8010:8000"
    env_file:
      - .env
    volumes:
      - saniflow-tmp:/tmp/saniflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  saniflow-tmp:
